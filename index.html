<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Brawl Stars - Guía de Brawlers</title>
    <style>

        body { font-family: 'Arial', sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        
        .container { max-width: 800px; width: 100%; background: #2d2d2d; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h1 { color: #ffcc00; text-transform: uppercase; font-size: 2.5em; margin-bottom: 20px; text-shadow: 3px 3px #000; }
        
        .portada-img { width: 100%; height: auto; border-radius: 15px; border: 5px solid #ffcc00; margin-bottom: 25px; box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); }
        
        nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        
        nav a { background: #0055ff; color: white; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; text-transform: uppercase; transition: all 0.3s ease; border-bottom: 4px solid #0033aa; display: flex; align-items: center; justify-content: center; }
        nav a:hover { background: #0077ff; transform: translateY(-3px); border-bottom-width: 6px; }
        
        nav a.conocenos { background: #ff8800; border-bottom-color: #cc6600; grid-column: span 1; }
        nav a.conocenos:hover { background: #ffa033; }

        p { font-size: 1.2em; color: #ccc; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Brawl Stars Wiki</h1>

            <a href="Artilleros.html">Artilleros</a>
            <a href="conocenos.html" class="conocenos">Conócenos</a>
        </nav>
    </div>
</body>
</html>
